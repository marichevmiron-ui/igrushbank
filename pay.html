<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Оплата заказа | Игруш Банк</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #eef2ff 0%, #d9e2f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .payment-card {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 56px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }
        .bank-brand {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 32px 20px;
            color: white;
        }
        .bank-brand h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .bank-brand p {
            opacity: 0.9;
            margin-top: 8px;
        }
        .order-details {
            padding: 32px 24px;
        }
        .amount-section {
            background: #f8fafd;
            border-radius: 48px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .amount-label {
            font-size: 1rem;
            color: #334155;
            letter-spacing: 1px;
        }
        .amount-value {
            font-size: 3.2rem;
            font-weight: 800;
            color: #1e3c72;
            margin-top: 8px;
            word-break: break-word;
        }
        .order-id {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #0f172a;
            margin-bottom: 28px;
        }
        .pay-action-btn {
            background: linear-gradient(95deg, #2a5298, #1e3c72);
            width: 100%;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            margin-bottom: 16px;
        }
        .pay-action-btn:active {
            transform: scale(0.97);
        }
        .pay-action-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
        .status-message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 40px;
            font-weight: 500;
        }
        .success-message {
            background: #dff9e6;
            color: #166534;
        }
        .waiting-message {
            background: #fff3e3;
            color: #9b4a0a;
        }
        .error-message {
            background: #ffe6e5;
            color: #b91c1c;
        }
        .footer-note {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 24px;
            padding-bottom: 20px;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="payment-card">
    <div class="bank-brand">
        <h1>🧸 Игруш Банк</h1>
        <p>Безопасная оплата заказа</p>
    </div>
    <div class="order-details">
        <div class="amount-section">
            <div class="amount-label">Сумма к оплате</div>
            <div class="amount-value" id="totalAmountRub">— ₽</div>
        </div>
        <div class="order-id" id="orderIdSpan">Загрузка информации...</div>
        
        <button id="payButton" class="pay-action-btn">💳 Оплатить</button>
        <div id="statusMessage" class="status-message waiting-message">⏳ Ожидание подтверждения</div>
        <div class="footer-note">Игруш Банк — надёжные платежи для ваших покупок</div>
    </div>
</div>

<script>
    // Инициализация Firebase (те же параметры)
    const firebaseConfig = {
        apiKey: "AIzaSyBTBhRE8jKBOQ03CpbmOMy7mW91GXaBx7c",
        authDomain: "world-call-4662e.firebaseapp.com",
        databaseURL: "https://world-call-4662e-default-rtdb.firebaseio.com",
        projectId: "world-call-4662e",
        storageBucket: "world-call-4662e.firebasestorage.app",
        messagingSenderId: "917512119108",
        appId: "1:917512119108:web:6000efc5c94d863765ad11",
        measurementId: "G-G7N72R1P9E"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Получаем orderId из URL: формат /pay/ORDER_ID
    const pathParts = window.location.pathname.split('/');
    let orderId = null;
    if (pathParts.length >= 3 && pathParts[1] === 'pay') {
        orderId = pathParts[2];
    }
    // fallback: если параметр через query (?id=...)
    if (!orderId && window.location.search.includes('id=')) {
        const params = new URLSearchParams(window.location.search);
        orderId = params.get('id');
    }
    
    if (!orderId) {
        document.body.innerHTML = '<div style="padding:2rem; text-align:center;">❌ Некорректная ссылка оплаты. Обратитесь в кассу.</div>';
        throw new Error('Order ID missing');
    }
    
    const totalSpan = document.getElementById('totalAmountRub');
    const orderIdSpan = document.getElementById('orderIdSpan');
    const payButton = document.getElementById('payButton');
    const statusDiv = document.getElementById('statusMessage');
    
    let orderRef = null;
    let currentStatus = 'waiting';
    
    // Подписка на данные заказа
    function loadOrder() {
        orderRef = database.ref(`orders/${orderId}`);
        orderRef.on('value', (snapshot) => {
            const order = snapshot.val();
            if (!order) {
                statusDiv.innerHTML = '❌ Заказ не найден';
                statusDiv.className = 'status-message error-message';
                payButton.disabled = true;
                return;
            }
            const total = order.total || 0;
            totalSpan.innerText = total + ' ₽';
            orderIdSpan.innerText = `Заказ № ${orderId}`;
            currentStatus = order.status || 'waiting';
            
            if (currentStatus === 'paid') {
                // Уже оплачен
                payButton.disabled = true;
                statusDiv.innerHTML = '✅ Заказ уже оплачен! Спасибо за покупку.';
                statusDiv.className = 'status-message success-message';
                payButton.style.background = '#9ca3af';
                payButton.innerText = 'Оплачено';
            } else if (currentStatus === 'waiting') {
                payButton.disabled = false;
                statusDiv.innerHTML = '💳 Нажмите «Оплатить» для подтверждения';
                statusDiv.className = 'status-message waiting-message';
                payButton.innerText = '💳 Оплатить';
            } else {
                payButton.disabled = true;
            }
        });
    }
    
    // Функция оплаты (меняет статус заказа в Firebase)
    async function processPayment() {
        if (currentStatus === 'paid') {
            alert('Этот заказ уже оплачен');
            return;
        }
        // Блокируем кнопку на время
        payButton.disabled = true;
        const originalText = payButton.innerHTML;
        payButton.innerHTML = '<span class="spinner"></span> Обработка...';
        
        try {
            // Обновляем статус заказа на 'paid'
            await database.ref(`orders/${orderId}`).update({
                status: 'paid',
                paidAt: Date.now()
            });
            // После успешного обновления подписка сама обновит интерфейс
            statusDiv.innerHTML = '✅ Оплата прошла успешно! Спасибо!';
            statusDiv.className = 'status-message success-message';
            payButton.innerHTML = '✅ Оплачено';
        } catch (error) {
            console.error(error);
            alert('Ошибка при оплате. Попробуйте ещё раз.');
            payButton.disabled = false;
            payButton.innerHTML = originalText;
        }
    }
    
    payButton.addEventListener('click', processPayment);
    
    loadOrder();
</script>
</body>
</html>
